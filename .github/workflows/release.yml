name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --generate-notes
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            os: darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: darwin
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Verify Cargo.toml version matches tag
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          TOML_VERSION=$(awk '/^\[workspace\.package\]/{f=1} f && /^version = /{gsub(/"/,"",$3); print $3; exit}' Cargo.toml)
          if [ "$VERSION" != "$TOML_VERSION" ]; then
            echo "Tag version ($VERSION) does not match Cargo.toml workspace version ($TOML_VERSION)" >&2
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p nordnet-cli

      - name: Package tarball
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          STAGE="nordnet-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist/$STAGE"
          cp "target/${{ matrix.target }}/release/nordnet" "dist/$STAGE/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/$STAGE/"
          tar -C dist -czf "dist/${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "dist/${STAGE}.tar.gz" > "dist/${STAGE}.tar.gz.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${{ needs.create-release.outputs.version }}"
          STAGE="nordnet-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          gh release upload "$TAG" \
            "dist/${STAGE}.tar.gz" \
            "dist/${STAGE}.tar.gz.sha256" \
            --clobber

  publish-crates:
    name: Publish to crates.io
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: Swatinem/rust-cache@v2

      - name: Publish nordnet-model
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p nordnet-model --locked

      - name: Publish nordnet-api
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p nordnet-api --locked

      - name: Publish nordnet-feed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p nordnet-feed --locked

      - name: Publish nordnet-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p nordnet-cli --locked

  finalize-release:
    name: Publish GitHub release
    needs: [create-release, build, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mark release non-draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
